<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VQR 2020-2024 Atenei</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.1.8/css/dataTables.bootstrap5.min.css">
  <link rel="stylesheet" href="https://cdn.datatables.net/buttons/3.2.2/css/buttons.bootstrap5.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container-fluid py-3">
    <div class="row g-3 align-items-start">
      <div class="col-12 col-lg-3">
        <div class="card shadow-sm sticky-top top-0">
          <div class="card-body">
            <h1 class="h4 mb-3">VQR 2020-2024 Atenei</h1>

            <label for="uniSelect" class="form-label">Seleziona università</label>
            <select id="uniSelect" class="form-select"></select>

            <div class="note-box mt-3">
              <b>Note</b><br>
              - R più è verde se &gt; 1, più è arancio se ≤ 1.<br>
              - REL_POS_100: 1 = migliori posizioni, 100 = peggiori.<br>
              - Filtri nelle intestazioni e download CSV/Excel disponibili.
            </div>
          </div>
        </div>
      </div>

      <div class="col-12 col-lg-9">
        <ul class="nav nav-tabs" id="mainTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#area-gev" type="button" role="tab">
              Area GEV
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#gsd" type="button" role="tab">
              GSD Ateneo
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ssd" type="button" role="tab">
              SSD Ateneo
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#dip" type="button" role="tab">
              Dipartimenti
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#dipgsd" type="button" role="tab">
              Dipartimenti e GSD
            </button>
          </li>
        </ul>

        <div class="tab-content bg-white border border-top-0 p-3 shadow-sm">
          <div class="tab-pane fade show active" id="area-gev" role="tabpanel">
            <ul class="nav nav-pills mb-3 subnav" data-group="area_gev"></ul>
            <div class="table-responsive">
              <table id="table-area-gev" class="table table-striped table-hover w-100"></table>
            </div>
          </div>

          <div class="tab-pane fade" id="gsd" role="tabpanel">
            <ul class="nav nav-pills mb-3 subnav" data-group="gsd"></ul>
            <div class="table-responsive">
              <table id="table-gsd" class="table table-striped table-hover w-100"></table>
            </div>
          </div>

          <div class="tab-pane fade" id="ssd" role="tabpanel">
            <ul class="nav nav-pills mb-3 subnav" data-group="ssd"></ul>
            <div class="table-responsive">
              <table id="table-ssd" class="table table-striped table-hover w-100"></table>
            </div>
          </div>

          <div class="tab-pane fade" id="dip" role="tabpanel">
            <ul class="nav nav-pills mb-3 subnav" data-group="dip"></ul>
            <div class="table-responsive">
              <table id="table-dip" class="table table-striped table-hover w-100"></table>
            </div>
          </div>

          <div class="tab-pane fade" id="dipgsd" role="tabpanel">
            <ul class="nav nav-pills mb-3 subnav" data-group="dipgsd"></ul>
            <div class="table-responsive">
              <table id="table-dipgsd" class="table table-striped table-hover w-100"></table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/2.1.8/js/dataTables.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.2/js/dataTables.buttons.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.2/js/buttons.bootstrap5.min.js"></script>
  <script src="https://cdn.datatables.net/buttons/3.2.2/js/buttons.html5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

  <script src="app.js"></script>
</body>
</html>
